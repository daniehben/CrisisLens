services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: crisislens_postgres
    environment:
      POSTGRES_DB: crisislens_db
      POSTGRES_USER: crisislens_user
      POSTGRES_PASSWORD: crisislens_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crisislens_user -d crisislens_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: crisislens_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data: