services:
  - type: web
    name: crisislens-worker
    env: python
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: python -m backend.ingestion_worker.scheduler
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: TELEGRAM_SESSION_B64
        sync: false
      - key: ARTICLE_RETENTION_DAYS
        value: "90"   # Tighten to 30-60 if Supabase storage > 400MB. Loosen to 120-180 on Supabase Pro.

  - type: web
    name: crisislens-api
    env: python
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.api_server.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false